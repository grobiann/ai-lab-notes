backend:
  name: github
  repo: grobiann/ai-lab-notes
  branch: main
  auth_type: pkce
  app_id: YOUR_GITHUB_OAUTH_APP_CLIENT_ID  # 아래 안내대로 발급 후 여기 입력

site_url: https://grobiann.github.io/ai-lab-notes

media_folder: "public/images/blog"
public_folder: "/ai-lab-notes/images/blog"

locale: ko

collections:
  - name: blog
    label: 블로그 글
    label_singular: 블로그 글
    folder: src/content/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: 제목, name: title, widget: string }
      - { label: 한줄 설명, name: description, widget: text }
      - { label: 작성일, name: pubDate, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: 수정일, name: updatedDate, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: 태그, name: tags, widget: list, default: [] }
      - { label: 임시저장 (비공개), name: draft, widget: boolean, default: false }
      - { label: 본문, name: body, widget: markdown }

  - name: projects
    label: 프로젝트
    label_singular: 프로젝트
    folder: src/content/projects
    create: true
    slug: "{{slug}}"
    fields:
      - { label: 제목, name: title, widget: string }
      - { label: 한줄 설명, name: description, widget: text }
      - { label: 태그, name: tags, widget: list, default: [] }
      - { label: GitHub URL, name: github, widget: string, required: false }
      - { label: 데모 URL, name: demo, widget: string, required: false }
      - { label: 정렬 순서, name: order, widget: number, default: 99 }
      - { label: 본문, name: body, widget: markdown }

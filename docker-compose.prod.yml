version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_lab_notes_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${REGISTRY_URL}/ai-lab-notes-backend:latest
    container_name: ai_lab_notes_api_prod
    restart: always
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DB_USER}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      DATABASE_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: https://yourdomain.com,https://www.yourdomain.com
    expose:
      - 3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ${REGISTRY_URL}/ai-lab-notes-frontend:latest
    container_name: ai_lab_notes_web_prod
    restart: always
    environment:
      REACT_APP_API_URL: https://yourdomain.com/api
      NODE_ENV: production
    expose:
      - 3000
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: ai_lab_notes_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data_prod:
